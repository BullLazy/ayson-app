name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            automake \
            autopoint \
            gettext

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip wheel setuptools
          python3 -m pip install buildozer==1.6.0 cython==0.29.37

      - name: Clean broken SDK cache
        run: |
          rm -rf "$HOME/.buildozer/android/platform/android-sdk"

      - name: Build APK
        run: |
          yes y | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ayson-apk
          path: bin/*.apk
